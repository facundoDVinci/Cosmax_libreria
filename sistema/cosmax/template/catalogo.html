
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        body{
            background-color:#ffffff;
        }

        .sidebar{
            width:200px;
            min-height:100vh;
            background:#000000;
        }

        .sidebar a{
            color:white;
            display:block;
            padding:15px;
            text-decoration: none;
        }

        .sidebar a:hover{
            background:#343a40;
        }

    </style>
</head>
<body>
<div class="d-flex">

    <div class="sidebar text-white">

        <h3 class="text-center py-4">COSMAX</h3>

        <a href="{% url 'vista_index' %}">Home</a>
        <a href="#">Stock</a>
        <a href="#">Ventas</a>
        <a href="#">Clientes</a>
        <a href="#">Usuarios</a>
        <a href="#">Cerrar sesión</a>

    </div>
        
    <div class="container mt-5">

        <div class="d-flex justify-content-between mb-4">
            <h2>Catálogo de Libros</h2>
            <a href="{% url 'agregar_libro' %}" class="btn btn-success">Añadir Libro</a>
        </div>


        <form method="GET" class="mb-4">

            <input
                type="text"
                name="buscar"
                class="form-control"
                placeholder="Buscar libro..."
                value="{{ busqueda }}"
            >

        </form>


        <table class="table table-bordered bg-white">

            <thead class="table-dark">
                <tr>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody>

            {% for libro in libros %}
            <tr>

                <td>{{ libro.titulo }}</td>
                <td>{{ libro.autor }}</td>
                <td>${{ libro.precio }}</td>
                <td>{{ libro.stock }}</td>

                <td>

                    <a href="{% url 'editar_libro' libro.id %}" class="btn btn-warning btn-sm">Editar</a>

                    <a href="{% url 'eliminar_libro' libro.id %}" class="btn btn-danger btn-sm">Eliminar</a>

                </td>

            </tr>
            {% empty %}

            <tr>
                <td colspan="5" class="text-center">No hay libros</td>
            </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>
</div>
</body>
</html>
