<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmax Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color:#ffffff;
        }

        .sidebar{
            width:200px;
            min-height:100vh;
            background:#000000;
        }

        .sidebar a{
            color:white;
            display:block;
            padding:15px;
            text-decoration: none;
        }

        .sidebar a:hover{
            background:#343a40;
        }

        .dashboard{
            border:none;
            border-radius:15px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

    </style>

</head>
<body>

<div class="d-flex">

    
    <div class="sidebar text-white">

        <h3 class="text-center py-4">COSMAX</h3>

        <a href="#">Libros</a>
        <a href="#">Stock</a>
        <a href="#">Ventas</a>
        <a href="#">Clientes</a>
        <a href="#">Usuarios</a>
        <a href="#">Cerrar sesión</a>

    </div>


    <div class="container-fluid p-4">

        <h2 class="mb-4">
            Bienvenido {{ request.user.username }}
        </h2>

        <div class="row g-4">

            <div class="col-md-3">
                <div class="card dashboard p-4">
                    <h5>Total de Libros</h5>
                    <h2>0</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card dashboard p-4">
                    <h5>Unidades en stock</h5>
                    <h2>0</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card dashboard p-4">
                    <h5>Clientes</h5>
                    <h2>0</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card dashboard p-4">
                    <h5>Libros con stock bajo</h5>
                    <h2>0</h2>
                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
