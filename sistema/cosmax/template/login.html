<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Cosmax</title>
</head>
<body>
    <h1>Login Cosmax</h1>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Usuario">

    <input type="password" name="password" placeholder="Contraseña">

    <button type="submit">
        Ingresar
    </button>

</form>
</body>
</html>
