<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmax Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <style>

        body{
            background: linear-gradient(135deg, #212529, #495057);
            min-height:100vh;
        }

        .login{
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.25);
        }

        .brand{
            font-size:2rem;
            font-weight:bold;
            color:#212529;
        }

        .btn-login{
            background:#212529;
            color:white;
        }

        .btn-login:hover{
            background:#343a40;
            color:white;
        }

    </style>

</head>
<body class="d-flex align-items-center justify-content-center">

<div class="card login p-5" style="width:420px;">

    <div class="text-center mb-4">

        <h1 class="brand">{{nombre_sistema}}</h1>

    </div>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">
                Usuario
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Ingrese su usuario"
                required
            >
        </div>


        <div class="mb-4">
            <label class="form-label">
                Contraseña
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Ingrese su contraseña"
                required
            >
        </div>


        <button type="submit" class="btn btn-login w-100">Ingresar</button>

    </form>

</div>

</body>
</html>
